# WriteFont 默认配置
# 手迹造字默认配置文件

# 图像预处理
preprocessing:
  target_size: 128          # 归一化目标尺寸
  binarization_threshold: 128  # 二值化阈值
  denoise_strength: 3       # 去噪强度
  min_char_size: 20         # 最小字符尺寸（像素）
  max_char_size: 200        # 最大字符尺寸（像素）

# OCR识别
ocr:
  engine: paddleocr         # paddleocr / crnn
  min_confidence: 0.7       # 置信度过滤阈值
  language: ch              # 语言

# 风格提取
style:
  feature_dim: 200          # 风格向量维度
  latent_dim: 200           # 潜在空间维度
  model_path: null          # 预训练模型路径，null 表示随机初始化
  device: auto              # auto / cpu / cuda
  image_size: 128           # 输入图像尺寸

# 字体生成
generator:
  model_type: diffusion     # diffusion / gan
  model_path: null          # 预训练模型路径
  img_size: 64              # 生成图像尺寸
  img_channels: 1
  style_dim: 200
  char_vocab_size: 8000
  char_emb_dim: 256
  num_diffusion_steps: 1000
  num_inference_steps: 50   # 扩散推理步数

# 字形渲染
renderer:
  target_size: [128, 128]
  threshold_method: otsu    # otsu / adaptive

# 矢量化
vectorizer:
  simplify_epsilon: 1.0
  upsample: 2

# 字体打包
packager:
  font_name: "MyHandwriting"
  family_name: "My Handwriting"
  style_name: "Regular"
  units_per_em: 1000
  ascent: 800
  descent: -200
  img_size: 128

# 输出
output:
  formats:                  # 输出格式
    - ttf
  font_name: "MyHandwriting"

# Gradio界面
frontend:
  server_name: "127.0.0.1"
  server_port: 7860
  share: false
  max_file_size: 20         # 最大上传文件大小(MB)
