name: writefont
description: 手迹造字 - 拍照生成手写字体的工具
publish_to: 'none'
version: 3.8.0+39

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  google_fonts: ^6.1.0
  
  # Image picking
  image_picker: ^1.0.7
  
  # Image processing
  image: ^4.1.7
  
  # Path and file operations
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # Permissions
  permission_handler: ^11.3.0
  
  # Share files
  share_plus: ^7.2.2
  
  # File picker for import
  file_picker: ^8.0.0+1
  
  # State management
  provider: ^6.1.2
  
  # UUID for unique filenames
  uuid: ^4.3.3

  # HTTP for API calls
  http: ^1.2.1

  # Crypto for API key obfuscation
  crypto: ^3.0.3

  # Zip archive for Google Fonts export
  archive: ^3.6.1

  # Local storage for settings
  shared_preferences: ^2.2.3

  # Secure storage for API keys
  flutter_secure_storage: ^9.2.4

  # OCR - Local text recognition (ML Kit)
  google_mlkit_text_recognition: ^0.15.1

  # App info for dynamic version display
  package_info_plus: ^8.0.0

  # Open URLs (GitHub link)
  url_launcher: ^6.2.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
